openapi: 3.1.0
info:
  title: Hasura GraphQL Engine HTTP APIs
  description: |
    Hasura GraphQL Engine exposes a small set of HTTP APIs in addition to its
    GraphQL endpoint. This specification documents the most commonly used
    endpoints: GraphQL queries/mutations/subscriptions, Relay GraphQL, the
    Metadata API, the Schema API, the PG Dump API, the Explain API, the
    Health Check API, the Source Health Check API, the Config API, and the
    Version API.

    Authentication: When the engine is started with HASURA_GRAPHQL_ADMIN_SECRET,
    requests must include the `x-hasura-admin-secret` header (or a valid JWT).
    Roles and session variables are passed via `x-hasura-role` and any
    `x-hasura-*` session headers.
  version: "2.0.0"
  contact:
    name: Hasura
    url: https://hasura.io/docs/2.0/api-reference/overview/
servers:
  - url: https://my-graphql-engine.example.com
    description: Self-hosted Hasura GraphQL Engine
paths:
  /v1/graphql:
    post:
      summary: Execute a GraphQL query, mutation, or subscription
      description: |
        Primary GraphQL endpoint. Accepts a single GraphQL operation or a
        batched array. Always returns HTTP 200; errors are returned in the
        response body.
      operationId: graphql
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GraphQLRequest'
                - type: array
                  items:
                    $ref: '#/components/schemas/GraphQLRequest'
      responses:
        "200":
          description: GraphQL response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLResponse'
  /v1beta1/relay:
    post:
      summary: Execute a Relay-compatible GraphQL operation
      operationId: relayGraphql
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
      responses:
        "200":
          description: GraphQL response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLResponse'
  /v1/metadata:
    post:
      summary: Manage Hasura metadata
      description: |
        Single endpoint for all metadata operations such as tracking tables,
        creating relationships, managing permissions, remote schemas, and
        actions. The request body specifies the metadata `type` (operation)
        and `args`.
      operationId: metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataRequest'
      responses:
        "200":
          description: Metadata operation result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid metadata request.
  /v2/query:
    post:
      summary: Execute schema/run_sql and other schema-level operations
      description: |
        Schema API used to run SQL, manage event triggers, and perform other
        database-schema operations. Replaces the deprecated /v1/query endpoint
        for Hasura v2 metadata format.
      operationId: schemaQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaRequest'
      responses:
        "200":
          description: Operation result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1alpha1/pg_dump:
    post:
      summary: Dump a Postgres source
      description: Execute pg_dump against a configured Postgres source.
      operationId: pgDump
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - opts
                - clean_output
                - source
              properties:
                opts:
                  type: array
                  description: pg_dump command-line options.
                  items:
                    type: string
                clean_output:
                  type: boolean
                source:
                  type: string
                  description: The configured database source name.
      responses:
        "200":
          description: SQL dump output (text/plain).
          content:
            text/plain:
              schema:
                type: string
  /v1/graphql/explain:
    post:
      summary: Explain a GraphQL query
      description: Returns the SQL plan for a given GraphQL query.
      operationId: explain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  $ref: '#/components/schemas/GraphQLRequest'
                user:
                  type: object
                  description: Optional session variables.
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Query plan.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /healthz:
    get:
      summary: Health check
      description: Returns 200 OK if the server is healthy.
      operationId: health
      security: []
      responses:
        "200":
          description: Server is healthy.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: Server is unhealthy.
  /v1/source_health:
    get:
      summary: Check health of configured data sources
      operationId: sourceHealth
      responses:
        "200":
          description: Source health report.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1alpha1/config:
    get:
      summary: Retrieve server configuration
      operationId: getConfig
      responses:
        "200":
          description: Server configuration.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/version:
    get:
      summary: Retrieve server version
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Server version.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
components:
  schemas:
    GraphQLRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: The GraphQL query string.
        operationName:
          type: string
          description: Name of the operation to execute, if multiple are provided.
        variables:
          type: object
          description: Variables for the GraphQL operation.
          additionalProperties: true
    GraphQLResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
        extensions:
          type: object
          additionalProperties: true
    MetadataRequest:
      type: object
      required:
        - type
        - args
      properties:
        type:
          type: string
          description: The metadata operation, e.g. `pg_track_table`, `export_metadata`, `bulk`.
        version:
          type: integer
          description: Optional metadata API version.
        args:
          description: Arguments for the metadata operation.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
    SchemaRequest:
      type: object
      required:
        - type
        - args
      properties:
        type:
          type: string
          description: The schema operation, e.g. `run_sql`, `bulk`.
        args:
          description: Arguments for the schema operation.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
  securitySchemes:
    adminSecret:
      type: apiKey
      in: header
      name: x-hasura-admin-secret
      description: Admin secret configured via HASURA_GRAPHQL_ADMIN_SECRET.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token, when JWT authentication is configured.
security:
  - adminSecret: []
  - bearerAuth: []
tags:
  - name: GraphQL
    description: GraphQL query, mutation, and subscription endpoints.
  - name: Metadata
    description: Hasura metadata management.
  - name: Schema
    description: Schema and SQL operations.
  - name: Operations
    description: Health, version, config, pg_dump, and explain endpoints.
