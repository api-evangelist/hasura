url: >-
  https://raw.githubusercontent.com/api-evangelist/hasura/refs/heads/main/apis.yml
apis:
  - aid: hasura:hasura
    name: Hasura
    tags:
      - API
    humanURL: ' https://hasura.io/'
    properties:
      - url: ' https://hasura.io/'
        type: Documentation
    description: >-
      We've spent years perfecting products that make it effortless to access
      and use data.PromptQL for AIAccurate AI by continuously learning the
      unique context of your business.
  - aid: hasura:hasura-graphql-api
    name: Hasura GraphQL API
    tags:
      - GraphQL
      - Queries
      - Mutations
      - Subscriptions
      - Realtime
    humanURL: https://hasura.io/docs/2.0/api-reference/graphql-api/index/
    properties:
      - url: https://hasura.io/docs/2.0/api-reference/graphql-api/index/
        type: Documentation
      - url: https://hasura.io/docs/2.0/api-reference/overview/
        type: APIReference
      - url: https://hasura.io/docs/2.0/api-reference/restified/
        type: Documentation
      - url: https://hasura.io/docs/2.0/getting-started/overview/
        type: GettingStarted
    description: >-
      The Hasura GraphQL Engine v2 provides instant realtime GraphQL APIs on
      your data with fine-grained access control. Supports GraphQL queries,
      mutations, and subscriptions at the /v1/graphql endpoint, along with
      RESTified GraphQL endpoints, Relay API, metadata API, schema API, config
      API, health check API, PG dump API, and explain API.
  - aid: hasura:hasura-metadata-api
    name: Hasura Metadata API
    tags:
      - Metadata
      - Configuration
      - Schema
    humanURL: https://hasura.io/docs/2.0/api-reference/metadata-api/index/
    properties:
      - url: https://hasura.io/docs/2.0/api-reference/metadata-api/index/
        type: Documentation
      - url: https://hasura.io/docs/2.0/api-reference/overview/
        type: APIReference
    description: >-
      The Hasura Metadata API allows programmatic management of Hasura GraphQL
      Engine configuration. All requests are POST requests to the /v1/metadata
      endpoint, supporting operations for managing data sources, tables,
      relationships, permissions, remote schemas, actions, event triggers, and
      RESTified endpoints.
  - aid: hasura:hasura-ddn-graphql-api
    name: Hasura DDN GraphQL API
    tags:
      - GraphQL
      - Data Delivery Network
      - DDN
      - Supergraph
      - Realtime
    humanURL: https://hasura.io/docs/3.0/graphql-api/overview/
    properties:
      - url: https://hasura.io/docs/3.0/graphql-api/overview/
        type: Documentation
      - url: https://hasura.io/docs/3.0/index/
        type: Documentation
      - url: https://hasura.io/docs/3.0/graphql-api/mutations/
        type: Documentation
      - url: https://hasura.io/docs/3.0/graphql-api/subscriptions/
        type: Documentation
      - url: https://hasura.io/docs/3.0/basics/
        type: GettingStarted
      - url: https://hasura.io/docs/3.0/reference/cli/
        type: CLI
      - url: https://hasura.io/docs/3.0/reference/cli/installation/
        type: Installation
      - url: https://hasura.io/docs/3.0/reference/metadata-reference/graphql-config/
        type: APIReference
    description: >-
      The Hasura Data Delivery Network (DDN) is a metadata-driven API platform
      that generates instant GraphQL APIs on any data source. It provides
      queries, mutations, and subscriptions as root-level fields, with support
      for global IDs, API versioning, Apollo Federation, filtering, sorting,
      aggregation, and joins across multiple data connectors including
      PostgreSQL, MongoDB, ClickHouse, MySQL, Snowflake, Elasticsearch, and
      SQL Server.
  - aid: hasura:hasura-cloud-api
    name: Hasura Cloud API
    tags:
      - Cloud
      - Management
      - Projects
    humanURL: https://hasura.io/docs/2.0/api-reference/cloud-api-reference/
    properties:
      - url: https://hasura.io/docs/2.0/api-reference/cloud-api-reference/
        type: Documentation
      - url: https://hasura.io/docs/2.0/hasura-cloud/projects/index/
        type: Documentation
    description: >-
      The Hasura Cloud API provides a GraphQL endpoint at
      https://data.pro.hasura.io/v1/graphql to programmatically create and
      manage Hasura Cloud projects, tenants, collaborators, and
      configurations. Authentication uses Personal Access Tokens via the
      Authorization header.
  - aid: hasura:promptql-natural-language-api
    name: PromptQL Natural Language API
    tags:
      - AI
      - Natural Language
      - PromptQL
      - LLM
    humanURL: https://promptql.io/docs/promptql-apis/natural-language-api/
    properties:
      - url: https://promptql.io/docs/promptql-apis/natural-language-api/
        type: Documentation
      - url: https://promptql.io/docs/promptql-apis/execute-program-api/
        type: Documentation
      - url: https://hasura.io/docs/promptql/index/
        type: Documentation
      - url: https://hasura.io/docs/promptql/quickstart/
        type: GettingStarted
      - url: https://github.com/hasura/promptql-python-sdk
        type: PythonSDK
      - url: https://www.npmjs.com/package/@hasura/promptql
        type: NodeSDK
    description: >-
      The PromptQL Natural Language API allows interaction with Hasura PromptQL
      to send natural language messages and receive AI-powered responses with
      streaming support. It enables accurate AI by continuously learning the
      unique context of your business data, composing tool calls and LLM tasks
      for high explainability, accuracy, and repeatability. Available in v1
      and v2 with Python and JavaScript SDKs.
